name: Generate Sitemap

on:
  push:
    branches:
      - main
    paths:
      - '**/index.html'

permissions:
  contents: write

jobs:
  build_sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Sitemap
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
        run: |
          python3 - <<'EOF'
          import os
          from datetime import datetime

          owner = os.environ['GITHUB_OWNER']
          repo = os.environ['GITHUB_REPO']

          # Auto-detect GitHub Pages base URL
          if repo.lower() == owner.lower():
              BASE_URL = f"https://{owner}.github.io/"
          else:
              BASE_URL = f"https://{owner}.github.io/{repo}/"

          if not BASE_URL.endswith('/'):
              BASE_URL += '/'

          entries = []

          for root, dirs, files in os.walk('.'):
              # Skip hidden directories
              dirs[:] = [d for d in dirs if not d.startswith('.')]

              for file in files:
                  if file != 'index.html':
                      continue

                  full_path = os.path.join(root, file)
                  rel_path = os.path.relpath(full_path, '.')

                  if rel_path == 'index.html':
                      url = BASE_URL
                  else:
                      folder = os.path.dirname(rel_path)
                      url = f"{BASE_URL}{folder}/"

                  lastmod = datetime.fromtimestamp(
                      os.path.getmtime(full_path)
                  ).strftime('%Y-%m-%d')

                  entries.append(
                      f"  <url>\n"
                      f"    <loc>{url}</loc>\n"
                      f"    <lastmod>{lastmod}</lastmod>\n"
                      f"  </url>"
                  )

          entries.sort()

          sitemap = [
              '<?xml version="1.0" encoding="UTF-8"?>',
              '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">'
          ]
          sitemap.extend(entries)
          sitemap.append('</urlset>')

          with open('sitemap.xml', 'w', encoding='utf-8') as f:
              f.write('\n'.join(sitemap))

          print(f"Sitemap generated for {BASE_URL} ({len(entries)} URLs).")
          EOF

      - name: Commit and Push Sitemap
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update sitemap.xml (index.html only)"
          file_pattern: sitemap.xml
