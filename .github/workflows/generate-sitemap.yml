name: Generate Sitemap

on:
  push:
    branches:
      - main
    paths:
      - '**/index.html'

permissions:
  contents: write

jobs:
  build_sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Sitemap
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
        run: |
          python3 - <<'EOF'
          import os
          from datetime import datetime

          owner = os.environ['GITHUB_OWNER']
          repo = os.environ['GITHUB_REPO']

          # Determine base URL (custom domain > GitHub Pages)
          if os.path.isfile('CNAME'):
              with open('CNAME', 'r', encoding='utf-8') as f:
                  domain = f.read().strip()
                  domain = domain.replace('http://', '').replace('https://', '').rstrip('/')
                  BASE_URL = f"https://{domain}/"
          else:
              if repo.lower() == owner.lower():
                  BASE_URL = f"https://{owner}.github.io/"
              else:
                  BASE_URL = f"https://{owner}.github.io/{repo}/"

          if not BASE_URL.endswith('/'):
              BASE_URL += '/'

          urls = set()

          for root, dirs, files in os.walk('.'):
              # Skip hidden directories
              dirs[:] = [d for d in dirs if not d.startswith('.')]

              if 'index.html' not in files:
                  continue

              full_path = os.path.join(root, 'index.html')
              rel_path = os.path.relpath(full_path, '.')

              if rel_path == 'index.html':
                  url = BASE_URL
              else:
                  folder = os.path.dirname(rel_path).lstrip('./')
                  url = f"{BASE_URL}{folder}/"

              lastmod = datetime.fromtimestamp(
                  os.path.getmtime(full_path)
              ).strftime('%Y-%m-%d')

              urls.add((url, lastmod))

          sitemap_lines = [
              '<?xml version="1.0" encoding="UTF-8"?>',
              '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">'
          ]

          for url, lastmod in sorted(urls):
              sitemap_lines.extend([
                  '  <url>',
                  f'    <loc>{url}</loc>',
                  f'    <lastmod>{lastmod}</lastmod>',
                  '  </url>'
              ])

          sitemap_lines.append('</urlset>')

          with open('sitemap.xml', 'w', encoding='utf-8', newline='\n') as f:
              f.write('\n'.join(sitemap_lines))

          print(f"Sitemap generated for {BASE_URL} ({len(urls)} URLs).")
          EOF

      - name: Commit and Push Sitemap
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update sitemap.xml (valid XML, index.html only)"
          file_pattern: sitemap.xml
