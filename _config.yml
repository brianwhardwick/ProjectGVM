# -----------------------------
# Jekyll configuration
# -----------------------------

plugins:
  - jekyll-sitemap

exclude:
  - "**/*.md"
  - "Gemfile"
  - "Gemfile.lock"
  - "node_modules"

permalink: pretty

# SPECIFIC FIX: Exclude everything from sitemap, then include index.html files
defaults:
  # Step 1: Set sitemap to false for every file in the project
  - scope:
      path: "" 
    values:
      sitemap: false
  
  # Step 2: Override and set sitemap to true only for index.html files
  - scope:
      path: "**/*index.html"
    values:
      sitemap: true
